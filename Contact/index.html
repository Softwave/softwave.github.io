				<h1>Contact</h1>
<h3>Basic description and saying I'll get back as soon as I can</h3>
<p>I am happy to hear from you! I will get back to you as soon as I can!</p>
<form class="contact-form" target="_blank" action="https://formsubmit.co/97addf6415ccbb6acdaf3cef2dec06a5" method="POST">
    <div class="form-group">
      <div class="form-row">
        <div class="col">
          <input type="text" name="name" class="form-control" placeholder="Full Name" required>
        </div>
        <div class="col">
          <input type="email" name="email" class="form-control" placeholder="Email Address" required>
        </div>
      </div>
    </div>
    <div class="form-group">
      <textarea placeholder="Your Message" class="form-control" name="message" rows="10" required></textarea>
    </div>
    <button type="submit" class="btn btn-lg btn-dark btn-block">Submit Form</button>
  </form>
